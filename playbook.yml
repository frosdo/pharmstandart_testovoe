---
- name: Setup Prometheus Node Exporter on Astra Linux
  hosts: farmstandart
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Create installation directory
      file:
        path: "{{ node_exporter_install_dir }}"
        state: directory
        mode: '0755'

    - name: Download and extract Node Exporter
      unarchive:
        src: "{{ node_exporter_download_url }}"
        dest: "{{ node_exporter_install_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=1]
        creates: "{{ node_exporter_install_dir }}/node_exporter"
      register: node_exporter_download

    - name: Copy binary to /usr/local/bin
      copy:
        src: "{{ node_exporter_install_dir }}/node_exporter"
        dest: "{{ node_exporter_binary }}"
        mode: '0755'
        remote_src: yes

    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'
        owner: nobody
        group: nogroup

    - name: Create configuration directory /etc/prometheus
      file:
        path: /etc/prometheus
        state: directory
        mode: '0755'

    - name: Create node_exporter config file (for documentation)
      template:
        src: templates/node_exporter.conf.j2
        dest: /etc/prometheus/node_exporter.conf
        mode: '0644'
      notify: restart node_exporter

    - name: Install systemd service file
      template:
        src: templates/node_exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
        mode: '0644'
      notify: restart node_exporter

    - name: Allow Prometheus server IP to access port {{ exporter_port }}
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ exporter_port }}"
        source: "{{ prometheus_server_ip }}"
        jump: ACCEPT
        comment: "Allow Prometheus"

    - name: Drop all other connections to port {{ exporter_port }}
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ exporter_port }}"
        jump: DROP
        comment: "Drop other connections"
      when: false   # Отключаем, чтобы случайно не заблокировать доступ, если нужно - уберите when: false

    - name: Enable and start node_exporter service
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

  handlers:
    - name: restart node_exporter
      systemd:
        name: node_exporter
        state: restarted
        daemon_reload: yes
